name: Kittygram CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. ПРОВЕРКА БЭКЕНДА
  backend_tests:
    name: Backend: Ruff & Django Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
          pip install -r backend/requirements.txt
      
      - name: Ruff check (linting)
        run: ruff check backend/
      
      - name: Run Django tests
        run: |
          cd backend
          python manage.py test --verbosity=1

  # 2. ПРОВЕРКА ФРОНТЕНДА
  frontend_tests:
    name: Frontend: Build & Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Check build
        run: |
          cd frontend
          npm run build --if-present
      
      - name: Run frontend tests (if exist)
        run: |
          cd frontend
          if npm run | grep -q '"test"'; then
            npm test -- --passWithNoTests --watchAll=false
          else
            echo "⚠️ No tests found in frontend, skipping..."
          fi

  # 3. ПРОВЕРКА DOCKER ОБРАЗОВ (сборка без пуша)
  docker_build_check:
    name: Docker: Build Check
    runs-on: ubuntu-latest
    needs: [backend_tests, frontend_tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image (check only)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: test-backend:latest
      
      - name: Build frontend image (check only)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: test-frontend:latest
      
      - name: Build gateway image (check only)
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: false
          load: true
          tags: test-gateway:latest

  # 4. СБОРКА И ПУШ НА DOCKER HUB
  build_and_push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [docker_build_check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest
            ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:${{ github.sha }}
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:${{ github.sha }}
      
      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:${{ github.sha }}

  # 5. УВЕДОМЛЕНИЕ В TELEGRAM
  send_telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [build_and_push]
    if: always() && (needs.build_and_push.result == 'success' || needs.build_and_push.result == 'failure')
    
    steps:
      - name: Send message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🐱 **Kittygram CI/CD Report**
            
            📦 **Repository:** ${{ github.repository }}
            🌿 **Branch:** ${{ github.ref_name }}
            🔑 **Commit:** ${{ github.sha }}
            
            📊 **Status:** ${{ needs.build_and_push.result == 'success' && '✅ SUCCESS' || '❌ FAILED' }}
            
            ${{ needs.build_and_push.result == 'success' && '🎉 Образы успешно загружены на Docker Hub!' || '⚠️ Произошла ошибка при сборке' }}
            
            🔗 **Actions:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}